<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroOasis — Sign-in Complete</title>
  <style>
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0b0b14;
      color: #e2e2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .card h1 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .card p {
      font-size: 0.9rem;
      color: #999;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #7c5cfc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Signing you in…</h1>
    <p>This window will close automatically.</p>
  </div>

  <script>
    (function () {
      "use strict";

      // Parse the access token from the URL fragment (#access_token=…&state=…)
      // This is the standard OAuth 2.0 implicit grant callback format.
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);

      var accessToken = params.get("access_token");
      var state = params.get("state");
      var error = params.get("error");
      var errorDescription = params.get("error_description");

      // Build the message to send back to the opener window.
      var message = { type: "retrooasis-oauth-callback" };

      if (error) {
        message.error = errorDescription || error;
      } else if (accessToken) {
        message.accessToken = accessToken;
        message.state = state || "";
      } else {
        message.error = "No access token found in the redirect. Please try again.";
      }

      // Send the result to the opener (the main RetroOasis window).
      if (window.opener) {
        window.opener.postMessage(message, window.location.origin);
      }

      // Close automatically after a short delay so the user sees the message.
      setTimeout(function () {
        window.close();
      }, 1500);
    })();
  </script>
</body>
</html>
